name: janarogya
description: AI-powered early cancer screening for rural India
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Image capture & processing
  image_picker: ^1.0.7
  image: ^4.1.7

  # On-device ML
  tflite_flutter: ^0.12.1

  # Networking
  http: ^1.2.1
  dio: ^5.4.0
  connectivity_plus: ^6.0.3

  # Maps & URL
  url_launcher: ^6.3.1

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # PDF & sharing
  open_file: ^3.3.2
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # State & storage
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Fonts & UI
  google_fonts: ^6.2.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/janarogya_skin_int8.tflite
    - assets/models/janarogya_oral_f32.tflite
    - assets/models/janarogya_oral_int8.tflite
    - assets/models/labels_skin.json
    - assets/models/labels_oral.json
