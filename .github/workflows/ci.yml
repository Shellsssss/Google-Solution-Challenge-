name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary fastapi uvicorn[standard] python-dotenv requests \
            pillow httpx pytest numpy aiofiles python-multipart \
            "python-jose[cryptography]" "passlib[bcrypt]" slowapi \
            reportlab "qrcode[pil]" firebase-admin google-genai

      - name: Install ML dependencies
        continue-on-error: true
        run: pip install --prefer-binary ai-edge-litert

      - name: Run tests
        run: |
          if [ -d "backend/tests" ]; then
            pytest backend/tests/ -v
          else
            echo "No tests directory — skipping pytest"
          fi

  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: cd app && flutter pub get
        env:
          TFLITE_FLUTTER_DISABLE_AUTOBUILD: true

      - name: Analyze
        run: cd app && flutter analyze --no-fatal-warnings
